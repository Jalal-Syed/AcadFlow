name: Build & Release

# ─────────────────────────────────────────────────────────────────────────────
# Trigger: push a tag like v0.1.0 → builds APK + 3 desktop installers →
#          creates a GitHub Release with all 4 files attached automatically.
#
# How to trigger:
#   git tag v0.1.0
#   git push origin v0.1.0
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Android APK (debug-signed, ready for sideloading)
  # ══════════════════════════════════════════════════════════════════════════
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a3252b7022090dea0b7b3a20e1e57a1e8d9e0f9f # v3.0.0
        with:
          version: 9

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'  # setup-node handles pnpm store caching natively

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Vite web app
        run: pnpm build

      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@00854ea68c109d98c75d956347303bf7c45b0277 # v3.2.1

      - name: Install Android platform 34
        run: echo "y" | sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync Capacitor (copies dist/ into Android project)
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        # Debug APK is automatically signed with a debug keystore —
        # users can install it on Android with "Install unknown apps" enabled.
        # For a Play Store release APK, see the README for keystore setup.

      - name: Rename APK with version tag
        run: |
          VERSION="${{ github.ref_name }}"
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/AcadFlow-${VERSION}-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/AcadFlow-*.apk
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Desktop builds (Windows EXE / Linux AppImage / macOS DMG)
  #         Run in parallel across 3 runners via matrix strategy
  # ══════════════════════════════════════════════════════════════════════════
  build-desktop:
    name: 🖥️ ${{ matrix.name }}
    strategy:
      fail-fast: false   # if one platform fails, keep building the others
      matrix:
        include:
          - name: Windows
            os: windows-latest
            build_flag: --win
            artifact_name: windows-exe
            artifact_path: release-builds/*.exe

          - name: Linux
            os: ubuntu-latest
            build_flag: --linux
            artifact_name: linux-appimage
            artifact_path: release-builds/*.AppImage

          - name: macOS
            os: macos-latest
            build_flag: --mac
            artifact_name: macos-dmg
            artifact_path: release-builds/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a3252b7022090dea0b7b3a20e1e57a1e8d9e0f9f # v3.0.0
        with:
          version: 9

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'  # setup-node handles pnpm store caching natively (cross-platform)

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # Linux: install native deps needed by electron-builder for AppImage
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - name: Build Vite web app
        run: pnpm build

      - name: Build Electron app — ${{ matrix.name }}
        run: pnpm exec electron-builder ${{ matrix.build_flag }} --publish onTagOrDraft
        env:
          # GH_TOKEN lets electron-builder upload latest.yml / latest-linux.yml /
          # latest-mac.yml to the GitHub Release so installed apps can auto-update.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Create GitHub Release and attach all 4 artifacts
  #         Runs after all build jobs complete successfully
  # ══════════════════════════════════════════════════════════════════════════
  release:
    name: 🚀 GitHub Release
    needs: [build-android, build-desktop]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Android APK
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: android-apk
          path: artifacts/android

      - name: Download Windows EXE
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: windows-exe
          path: artifacts/windows

      - name: Download Linux AppImage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: linux-appimage
          path: artifacts/linux

      - name: Download macOS DMG
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: macos-dmg
          path: artifacts/macos

      - name: List all artifacts (debug)
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba39571d65e131e1e9a5c5d20 # v2.2.2
        with:
          name: AcadFlow ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body: |
            ## AcadFlow ${{ github.ref_name }} 🦉

            > Your semester, under control.

            ---

            ### 📥 Downloads

            | Platform | File | Instructions |
            |---|---|---|
            | 🤖 **Android** | `AcadFlow-${{ github.ref_name }}-android.apk` | Enable **Settings → Install unknown apps**, then open the APK |
            | 🪟 **Windows** | `AcadFlow-Setup-*.exe` | Run the installer, click through the wizard |
            | 🐧 **Linux** | `AcadFlow-*.AppImage` | `chmod +x AcadFlow-*.AppImage` then double-click or run it |
            | 🍎 **macOS** | `AcadFlow-*.dmg` | Open DMG, drag AcadFlow to Applications |

            ---

            ### ⚠️ Notes
            - **Android APK** is debug-signed. Android will warn "installed from unknown source" — that's normal for APKs not from Play Store. It is safe.
            - **macOS**: if you see "unidentified developer" warning, right-click the app → Open → Open anyway (Apple Gatekeeper).
            - **Linux**: AppImage requires FUSE. Most distros have it. If not: `sudo apt install fuse libfuse2`.

            ---

            Built from commit `${{ github.sha }}`
          files: |
            artifacts/android/*.apk
            artifacts/windows/*.exe
            artifacts/linux/*.AppImage
            artifacts/macos/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
